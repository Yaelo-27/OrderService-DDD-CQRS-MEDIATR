services:
  db:
    container_name: sql-course
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
      - ACCEPT_EULA=Y
    volumes:
      - sql-vol:/var/opt/mssql
volumes:
  sql-vol:
      external: true