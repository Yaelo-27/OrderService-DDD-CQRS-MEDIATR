services:
  db:
    container_name: sql-server25
    image: mcr.microsoft.com/mssql/server:2025-RC0-ubuntu-24.04
    ports:
      - "1433:1433"
    environment:
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
      - ACCEPT_EULA=Y
    volumes:
      - sql-vol:/var/opt/mssql
volumes:
  sql-vol:
      external: true